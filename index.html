<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>武術比賽報名與自動賽程系統</title>
<!-- ================= CSS ================= -->
<style>
:root{
  --bg:#0b1220; --panel:#111c30; --panel2:#16233c; --line:#24314f;
  --txt:#e8eef9; --muted:#8ea0bd; --gold:#e0b84d; --red:#e0414a; --green:#27c08a;
  --blue:#3b82f6; --accent:#e0b84d;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei","Segoe UI",system-ui,sans-serif;background:
  radial-gradient(1200px 600px at 80% -10%,#1a2740 0%,transparent 60%),var(--bg);
  color:var(--txt);min-height:100vh;-webkit-text-size-adjust:100%}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
.hidden{display:none!important}

/* 頂部列 */
header{position:sticky;top:0;z-index:50;background:rgba(11,18,32,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:10px 16px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:1px}
.logo .badge{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--gold),#b8862a);
  display:grid;place-items:center;color:#1a1304;font-weight:900;font-size:18px}
.logo small{display:block;color:var(--muted);font-weight:500;font-size:11px;letter-spacing:0}
.spacer{flex:1}
.evtsel{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 10px;max-width:240px}
/* 修正深色主題下原生 select 彈出選單「白底白字看不到」：所有下拉選項一律白底深字 */
.evtsel option,.inp option,select option{color:#111827;background:#ffffff}
.role-chip{font-size:12px;color:var(--gold);border:1px solid var(--gold);border-radius:20px;padding:4px 12px}
.btn-logout{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:7px 12px;font-size:13px}

/* 分頁 */
nav.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--bg)}
nav.tabs button{white-space:nowrap;background:var(--panel);border:1px solid var(--line);color:var(--muted);
  border-radius:9px;padding:9px 14px;font-size:14px;font-weight:600}
nav.tabs button.active{background:linear-gradient(135deg,var(--gold),#c79a36);color:#1a1304;border-color:transparent}

main{max-width:1180px;margin:0 auto;padding:18px 16px 60px}
.page{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

/* 卡片 / 區塊 */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
.card h2{font-size:17px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h2 .bar{width:5px;height:18px;background:var(--gold);border-radius:3px;display:inline-block}
.sub{color:var(--muted);font-size:13px;margin-bottom:12px}

.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr}}

label.f{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.inp{width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);
  border-radius:9px;padding:10px 12px;font-size:14px}
.inp:focus{outline:none;border-color:var(--gold)}

.btn{border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;color:#fff;background:var(--blue)}
.btn.gold{background:linear-gradient(135deg,var(--gold),#c79a36);color:#1a1304}
.btn.green{background:var(--green)} .btn.red{background:var(--red)} .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
.btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

/* 表格 */
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{background:var(--panel2);color:var(--muted);font-weight:600;position:sticky;top:0}
tr:hover td{background:rgba(255,255,255,.02)}

.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700}
.pill.ok{background:rgba(39,192,138,.16);color:var(--green)}
.pill.wait{background:rgba(224,184,77,.16);color:var(--gold)}
.pill.no{background:rgba(224,65,74,.16);color:var(--red)}

/* 戰情室數字卡 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:16px}
.stat .n{font-size:30px;font-weight:900;color:var(--gold)}
.stat .l{color:var(--muted);font-size:13px;margin-top:3px}

/* 對戰表 */
.bracket{display:flex;gap:34px;overflow:auto;padding:8px 2px}
.round{display:flex;flex-direction:column;justify-content:space-around;gap:14px;min-width:190px}
.round h4{font-size:12px;color:var(--muted);text-align:center;margin-bottom:4px}
.match{background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.match .side{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;font-size:13px;gap:8px}
.match .side+.side{border-top:1px solid var(--line)}
.match .side.win{background:rgba(224,184,77,.12)}
.match .side.win .nm{color:var(--gold);font-weight:800}
.match .side.bye{opacity:.5;font-style:italic}
.match .side .u{color:var(--muted);font-size:11px}
.match .side button{background:transparent;border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-size:11px;padding:2px 7px}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#0f1830;border:1px solid var(--gold);
  color:var(--txt);padding:13px 22px;border-radius:12px;z-index:200;box-shadow:0 10px 40px rgba(0,0,0,.5);font-weight:600;max-width:90vw}
.loading{text-align:center;color:var(--muted);padding:30px}

/* 登入 */
.login-wrap{max-width:430px;margin:6vh auto;text-align:center}
.role-cards{display:grid;gap:12px;margin-top:18px}
.role-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;text-align:left;display:flex;gap:14px;align-items:center}
.role-card:hover{border-color:var(--gold)}
.role-card .ic{font-size:30px}
.role-card h3{font-size:16px}.role-card p{color:var(--muted);font-size:13px;margin-top:2px}

/* 首頁 Hero 行銷頁 */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;z-index:-1;opacity:.07;
  background:repeating-linear-gradient(45deg,var(--gold) 0 2px,transparent 2px 26px)}
.hero .brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.hero .brand .badge{width:46px;height:46px;font-size:24px}
.hero .brand b{font-size:20px;letter-spacing:1px}
.hero .pain{max-width:680px;color:var(--muted);font-size:15px;line-height:1.85;
  background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--gold);
  border-radius:12px;padding:16px 20px;margin-bottom:26px}
.hero h1{font-size:34px;line-height:1.35;font-weight:900;max-width:760px;margin-bottom:14px}
.hero h1 .hl{color:var(--gold)}
.hero .subtitle{color:var(--muted);font-size:17px;margin-bottom:34px;max-width:620px}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:720px}
.hero-btn{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:26px 20px;cursor:pointer;transition:.15s;text-align:center}
.hero-btn:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 14px 40px rgba(0,0,0,.4)}
.hero-btn.primary{background:linear-gradient(160deg,#1e2c49,var(--panel));border-color:var(--gold)}
.hero-btn .ic{font-size:38px;display:block;margin-bottom:10px}
.hero-btn .t{font-size:19px;font-weight:800}
.hero-btn .d{color:var(--muted);font-size:13px;margin-top:6px}
.hero-feats{margin-top:30px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:760px}
.hero-feats span{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:12.5px;color:var(--muted)}
@media(max-width:760px){.hero h1{font-size:26px}.hero .subtitle{font-size:15px}.hero-btn{min-width:100%}}

.minisec{border:1px dashed var(--line);border-radius:12px;padding:14px;margin-top:12px}
.athlete-row{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
.rm{color:var(--red);background:transparent;border:none;font-size:18px}
.tag{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:3px 9px;font-size:12px;margin:2px}

/* 現場模式 競技場 */
.arena{background:linear-gradient(160deg,#1a2740,var(--panel));border:1px solid var(--line);border-radius:16px;padding:20px}
.arena.done{text-align:center}
.arena-top{text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px}
.arena .vs{display:flex;align-items:stretch;gap:12px}
.fighter{flex:1;border-radius:14px;padding:18px 12px;text-align:center;border:2px solid transparent}
.fighter.red{background:rgba(224,65,74,.13);border-color:rgba(224,65,74,.5)}
.fighter.blue{background:rgba(37,99,235,.13);border-color:rgba(37,99,235,.5)}
.fighter .cor{font-size:12px;font-weight:700;letter-spacing:2px;opacity:.8}
.fighter.red .cor{color:var(--red)} .fighter.blue .cor{color:#60a5fa}
.fighter .fn{font-size:22px;font-weight:900;margin:6px 0}
.fighter .fu{color:var(--muted);font-size:13px;margin-bottom:10px}
.scoreInp{text-align:center;font-size:18px;font-weight:700}
.vsx{display:flex;align-items:center;font-weight:900;color:var(--gold);font-size:22px}
.arena-btns{display:flex;gap:12px;margin-top:18px}
.nextbar{margin-top:14px;background:var(--panel2);border:1px dashed var(--line);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--txt)}
.nextbar .u{color:var(--muted);font-size:12px}
.arena .champ{font-size:26px;font-weight:900;color:var(--gold);margin:10px 0 16px}
@media(max-width:600px){.fighter .fn{font-size:18px}.arena-btns{flex-direction:column}}
</style>
</head>
<body>

<!-- ============ 首頁 Hero 行銷頁 ============ -->
<div id="loginScreen">
  <div class="hero">
    <div class="brand"><span class="badge">武</span><b>武術賽事管理平台</b></div>

    <div class="pain">
      辦武術比賽最麻煩的不是比賽當天，而是<b style="color:var(--txt)">報名整理、組別分類、量級確認、出場序、對戰表、成績與獎狀名單</b>。
    </div>

    <h1>一鍵完成武術比賽<span class="hl">報名、分組、抽籤</span>與<span class="hl">賽程產生</span></h1>
    <p class="subtitle">適用套路、散打、傳統武術、器械與團體項目。</p>

    <div class="hero-btns">
      <div class="hero-btn primary" onclick="chooseRole('coach')">
        <span class="ic">📝</span><div class="t">我要報名</div><div class="d">教練 / 單位線上報名</div>
      </div>
      <div class="hero-btn" onclick="chooseRole('admin')">
        <span class="ic">🛡️</span><div class="t">管理者後台</div><div class="d">審核 · 分組 · 賽程 · 現場模式</div>
      </div>
      <div class="hero-btn" onclick="chooseRole('player')">
        <span class="ic">🔍</span><div class="t">查詢賽程</div><div class="d">選手 / 家長查出場序與名次</div>
      </div>
    </div>

    <div class="hero-feats">
      <span>✅ 自動分組</span><span>✅ 套路出場序</span><span>✅ 散打單敗淘汰補BYE</span>
      <span>✅ 團體出場序</span><span>✅ 現場計分</span><span>✅ 成績/獎狀</span><span>✅ LINE通知</span><span>✅ 秩序冊PDF</span>
    </div>

    <div id="adminPw" class="minisec hidden" style="margin-top:22px;max-width:380px;width:100%">
      <label class="f">管理者密碼</label>
      <input id="pwInput" class="inp" type="password" placeholder="預設 wushu2026" onkeydown="if(event.key==='Enter')doLogin('admin')">
      <div class="btnrow"><button class="btn gold" style="flex:1" onclick="doLogin('admin')">🛡️ 登入後台</button></div>
    </div>
  </div>
</div>

<!-- ============ 主畫面 ============ -->
<div id="app" class="hidden">
  <header>
    <div class="logo"><span class="badge">武</span><div>武術賽事系統<small id="hdrSub">戰情室</small></div></div>
    <div class="spacer"></div>
    <select id="eventSelect" class="evtsel" onchange="onEventChange()"></select>
    <span id="roleChip" class="role-chip">管理者</span>
    <button class="btn-logout" onclick="logout()">登出</button>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="view"></main>
</div>

<div id="toast" class="toast hidden"></div>

<!-- ===== 本機預覽 Mock 後端（取代 google.script.run） ===== -->
<script>
/* ===================================================================
 *  本機預覽用 Mock 後端：在瀏覽器直接模擬 google.script.run
 *  ※ 資料存在記憶體（重整即還原測試資料），純展示用，不寫雲端
 * =================================================================== */
(function(){
  function uid(p){return (p||'id')+'_'+Math.random().toString(36).slice(2,9);}
  function clone(o){return JSON.parse(JSON.stringify(o));}

  // ---- 記憶體資料表 ----
  var DB={Events:[],Items:[],Groups:[],WeightClasses:[],Registrations:[],Teams:[],Schedules:[],Results:[],Settings:{}};

  // ---- 種子資料（同 setupSheets）----
  var eventId=uid('evt');
  DB.Events.push({id:eventId,name:'2026 全國武術錦標賽（本機展示）',date:'2026-08-15',location:'育林國中體育館',
    host:'中華民國武術總會',regStart:'2026-06-01',regEnd:'2026-07-31',status:'報名中'});
  ['幼兒組','國小低年級','國小中年級','國小高年級','國中組','高中組','大專組','社會組','長青組']
    .forEach(function(g){DB.Groups.push({id:uid('grp'),name:g,note:''});});
  [['男子-48kg','男子',0,48],['男子-52kg','男子',48,52],['男子-56kg','男子',52,56],['男子-60kg','男子',56,60],
   ['男子-65kg','男子',60,65],['男子-70kg','男子',65,70],['女子-48kg','女子',0,48],['女子-52kg','女子',48,52],
   ['女子-56kg','女子',52,56],['女子-60kg','女子',56,60]]
    .forEach(function(w){DB.WeightClasses.push({id:uid('wt'),name:w[0],gender:w[1],minW:w[2],maxW:w[3]});});
  var items=[['長拳','套路'],['南拳','套路'],['太極拳','套路'],['刀術','套路'],['劍術','套路'],['棍術','套路'],
    ['槍術','套路'],['傳統拳術','套路'],['傳統器械','套路'],['散打','散打'],['集體拳術','團體'],
    ['集體器械','團體'],['雙人對練','團體']];
  var itemId={};
  items.forEach(function(it){var id=uid('itm');itemId[it[0]]=id;
    DB.Items.push({id:id,eventId:eventId,name:it[0],type:it[1],needWeight:it[1]==='散打'});});
  var grpNation=DB.Groups.filter(function(g){return g.name==='國中組';})[0];
  var units=['雄麒武館','育林國中','飛龍武術社','長青拳社','少林精武會'];
  for(var i=0;i<10;i++)DB.Registrations.push({id:uid('reg'),eventId:eventId,unit:units[i%5],coach:'教練'+(i%5+1),
    phone:'09000'+i,email:'c'+i+'@t.com',athleteName:'長拳選手'+(i+1),gender:'男子',birthday:'2011-03-01',age:14,
    school:units[i%5],grade:'八年級',itemId:itemId['長拳'],itemName:'長拳',itemType:'套路',
    groupId:grpNation.id,groupName:'國中組',weight:'',weightClass:'',review:'已審核',fee:'已繳費'});
  for(var j=0;j<7;j++)DB.Registrations.push({id:uid('reg'),eventId:eventId,unit:units[j%5],coach:'教練'+(j%5+1),
    phone:'09110'+j,email:'c'+j+'@t.com',athleteName:'散打選手'+(j+1),gender:'男子',birthday:'2011-05-01',age:14,
    school:units[j%5],grade:'八年級',itemId:itemId['散打'],itemName:'散打',itemType:'散打',
    groupId:grpNation.id,groupName:'國中組',weight:59,weightClass:'男子-60kg',review:'已審核',fee:'已繳費'});
  for(var k=0;k<2;k++)DB.Teams.push({id:uid('team'),eventId:eventId,unit:units[k],coach:'教練'+(k+1),phone:'0922'+k,
    email:'tm'+k+'@t.com',teamName:units[k]+'對練隊',itemId:itemId['雙人對練'],itemName:'雙人對練',
    groupId:grpNation.id,groupName:'國中組',members:JSON.stringify(['隊員A'+k,'隊員B'+k]),review:'已審核',fee:'已繳費'});
  DB.Settings={adminPassword:'wushu2026'};

  function regsBy(f){f=f||{};return DB.Registrations.filter(function(r){
    return (!f.eventId||r.eventId===f.eventId)&&(!f.unit||r.unit===f.unit)&&(!f.itemId||r.itemId===f.itemId)&&
      (!f.groupName||r.groupName===f.groupName)&&(!f.gender||r.gender===f.gender)&&
      (!f.weightClass||r.weightClass===f.weightClass)&&(!f.fee||r.fee===f.fee)&&(!f.review||r.review===f.review);
  });}
  function teamsBy(eid){return DB.Teams.filter(function(t){return !eid||t.eventId===eid;})
    .map(function(t){var c=clone(t);try{c.membersArr=JSON.parse(t.members);}catch(e){c.membersArr=[];}return c;});}

  // ---- 賽程演算法（同 Code.gs）----
  function spread(athletes){var by={};athletes.forEach(function(a){(by[a.unit]=by[a.unit]||[]).push(a);});
    var us=Object.keys(by).sort(function(a,b){return by[b].length-by[a].length;});var res=[],add=true;
    while(add){add=false;us.forEach(function(u){if(by[u].length){res.push(by[u].shift());add=true;}});}return res;}
  function perfOrder(athletes){var o=spread(athletes.slice());
    for(var i=1;i<o.length;i++){if(o[i].unit===o[i-1].unit){var sw=-1;
      for(var j=i+1;j<o.length;j++){if(o[j].unit!==o[i-1].unit&&(j+1>=o.length||o[j+1].unit!==o[i].unit)){sw=j;break;}}
      if(sw>-1){var t=o[i];o[i]=o[sw];o[sw]=t;}}}
    return o.map(function(a,i){return {seq:i+1,name:a.name,unit:a.unit,id:a.id};});}
  function seedOrder(size){var s=[1,2],rounds=Math.round(Math.log(size)/Math.log(2));
    for(var r=1;r<rounds;r++){var sum=Math.pow(2,r+1)+1,nx=[];
      for(var i=0;i<s.length;i++){nx.push(s[i]);nx.push(sum-s[i]);}s=nx;}return s;}
  function propagate(rounds){for(var r=0;r<rounds.length-1;r++){var cur=rounds[r],nxt=rounds[r+1];
    for(var m=0;m<cur.length;m++){var tg=nxt[Math.floor(m/2)],slot=(m%2===0)?'a':'b';
      if(cur[m].winner)tg[slot]={id:cur[m].winner.id,name:cur[m].winner.name,unit:cur[m].winner.unit};}}}
  function knockout(athletes){var players=spread(athletes.slice()),n=players.length,size=1;
    while(size<n)size*=2;if(size<2)size=2;
    var ord=seedOrder(size),slots=ord.map(function(sn){return sn<=n?players[sn-1]:null;});
    var r1=[];for(var i=0;i<slots.length;i+=2){var a=slots[i],b=slots[i+1],w=null;
      if(a&&!b)w=a;if(!a&&b)w=b;
      r1.push({matchNo:r1.length+1,a:a?{id:a.id,name:a.name,unit:a.unit}:{name:'BYE',bye:true},

      var b=s.dataObj.bracket,play=[];b.rounds.forEach(function(rd,ri){rd.forEach(function(mm,mi){if(mm.a&&mm.b&&!mm.a.bye&&!mm.b.bye&&!mm.winner)play.push({ri:ri,mi:mi,a:mm.a,b:mm.b,scoreA:mm.scoreA||'',scoreB:mm.scoreB||''});});});
      var done=0;b.rounds.forEach(function(rd){rd.forEach(function(mm){if(mm.winner&&mm.a&&mm.b&&!mm.a.bye&&!mm.b.bye)done++;});});
      var last=b.rounds[b.rounds.length-1][0],champ=last&&last.winner?last.winner:null;
      return {scheduleId:s.id,groupKey:s.groupKey,totalPlayers:b.count,current:play[0]||null,next:play[1]||null,remaining:play.length,doneCount:done,champion:champ,finished:play.length===0};});},
    completeLiveMatch:function(sid,ri,mi,res){var s=DB.Schedules.filter(function(v){return v.id===sid;})[0];if(!s)return {ok:false,msg:'找不到賽程'};
      var d=JSON.parse(s.data);if(!d.bracket)return {ok:false,msg:'非對戰表'};var m=d.bracket.rounds[ri][mi];if(!m.a||!m.b||m.a.bye||m.b.bye)return {ok:false,msg:'此場無法進行'};
      var ws=res.winnerSide;if(res.walkover){ws=res.walkover==='a'?'b':'a';m.walkover=res.walkover;}var w=ws==='a'?m.a:m.b;if(!w)return {ok:false,msg:'請指定勝方'};
      if(res.scoreA!==undefined)m.scoreA=res.scoreA;if(res.scoreB!==undefined)m.scoreB=res.scoreB;m.winner={id:w.id,name:w.name,unit:w.unit};propagate(d.bracket.rounds);s.data=JSON.stringify(d);return {ok:true,msg:'✅ 已完成本場，勝方 '+w.name+' 自動晉級'};},
    rankByScore:function(eid,groupKey,scores){DB.Results=DB.Results.filter(function(r){return !(r.eventId===eid&&r.groupKey===groupKey);});
      var sorted=(scores||[]).slice().sort(function(a,b){return Number(b.score)-Number(a.score);});
      sorted.forEach(function(x,i){DB.Results.push({id:uid('res'),eventId:eid,itemId:'',groupKey:groupKey,name:x.name,unit:x.unit||'',rank:i+1,score:x.score,note:'依分數自動排名'});});
      return {ok:true,msg:'已依分數排名 '+sorted.length+' 人',ranking:sorted.map(function(x,i){return {rank:i+1,name:x.name,score:x.score};})};},
    generateSandaPodium:function(sid){var s=DB.Schedules.filter(function(v){return v.id===sid;})[0];if(!s)return {ok:false,msg:'找不到賽程'};
      var d=JSON.parse(s.data);if(!d.bracket)return {ok:false,msg:'非對戰表'};var rs=d.bracket.rounds,fm=rs[rs.length-1][0];if(!fm||!fm.winner)return {ok:false,msg:'冠軍戰尚未產生勝方'};
      var champ=fm.winner,ru=(fm.a&&fm.a.name===champ.name)?fm.b:fm.a,thirds=[];
      if(rs.length>=2)rs[rs.length-2].forEach(function(m){if(m.winner&&m.a&&m.b){var l=(m.a.name===m.winner.name)?m.b:m.a;if(l&&!l.bye)thirds.push(l);}});
      DB.Results=DB.Results.filter(function(r){return !(r.eventId===s.eventId&&r.groupKey===s.groupKey);});
      var pod=[{rank:1,p:champ},{rank:2,p:ru}];thirds.forEach(function(t){pod.push({rank:3,p:t});});
      pod.forEach(function(x){if(!x.p)return;DB.Results.push({id:uid('res'),eventId:s.eventId,itemId:s.itemId,groupKey:s.groupKey,name:x.p.name,unit:x.p.unit||'',rank:x.rank,score:'',note:'對戰結果'});});
      return {ok:true,msg:'已產生冠亞季軍',podium:pod.map(function(x){return {rank:x.rank,name:x.p?x.p.name:''};})};},
    publicSearch:function(eid,kw){kw=(kw||'').trim();var regs=regsBy({eventId:eid}),teams=teamsBy(eid),schedules=getSchedules(eid),results=DB.Results.filter(function(r){return r.eventId===eid;});
      function find(name){var f=[];schedules.forEach(function(s){var d=s.dataObj;
        if(d.kind==='order')d.order.forEach(function(o){if(o.name===name)f.push({groupKey:s.groupKey,type:'套路出場序',seq:o.seq});});
        else if(d.kind==='bracket')d.bracket.rounds[0].forEach(function(m,i){
          if(m.a&&m.a.name===name)f.push({groupKey:s.groupKey,type:'散打對戰',pos:'第'+(i+1)+'場 紅方'});
          if(m.b&&m.b.name===name)f.push({groupKey:s.groupKey,type:'散打對戰',pos:'第'+(i+1)+'場 黑方'});});
        else if(d.kind==='teamOrder')d.order.forEach(function(o){if(o.teamName===name)f.push({groupKey:s.groupKey,type:'團體出場序',seq:o.seq});});});return f;}
      return {ok:true,
        athletes:regs.filter(function(r){return !kw||r.athleteName.indexOf(kw)>-1||r.unit.indexOf(kw)>-1;}).map(function(r){
          return {name:r.athleteName,unit:r.unit,itemName:r.itemName,groupName:r.groupName,gender:r.gender,weightClass:r.weightClass,
            review:r.review,fee:r.fee,schedule:find(r.athleteName),
            result:results.filter(function(x){return x.name===r.athleteName;}).map(function(x){return {rank:x.rank,groupKey:x.groupKey,score:x.score};})};}),
        teams:teams.filter(function(t){return !kw||t.teamName.indexOf(kw)>-1||t.unit.indexOf(kw)>-1||JSON.stringify(t.membersArr).indexOf(kw)>-1;}).map(function(t){
          return {teamName:t.teamName,unit:t.unit,itemName:t.itemName,groupName:t.groupName,members:t.membersArr,review:t.review,fee:t.fee,schedule:find(t.teamName)};})};},
    getSetting:function(k){return DB.Settings[k]||'';},
    setSetting:function(k,v){DB.Settings[k]=v;return {ok:true};},
    buildRegLineText:function(eid,unit){return regLineText(eid,unit);},
    buildScheduleLineText:function(eid){return schedLineText(eid);},
    pushScheduleToLine:function(){return {ok:false,msg:'本機預覽版不支援真實推播，請用「複製 LINE 文字」'};},
    pushLineMessage:function(){return {ok:false,msg:'本機預覽版不支援真實推播'};}
  };

  // ---- 模擬 google.script.run（每次 withSuccessHandler 產生新 ctx，支援 Promise.all 並行）----
  function makeCtx(s,f){var ctx={_s:s||null,_f:f||null};
    ctx.withSuccessHandler=function(fn){ctx._s=fn;return ctx;};
    ctx.withFailureHandler=function(fn){ctx._f=fn;return ctx;};
    Object.keys(API).forEach(function(name){ctx[name]=function(){var args=arguments;
      setTimeout(function(){try{var r=API[name].apply(null,args);ctx._s&&ctx._s(r);}
        catch(e){console.error(name,e);ctx._f?ctx._f(e):0;}},20);return ctx;};});
    return ctx;}
  window.google={script:{run:{withSuccessHandler:function(f){return makeCtx(f);},
    withFailureHandler:function(f){return makeCtx(null,f);}}}};
})();

</script>
<!-- ================= JavaScript ================= -->
<script>
/* ---------- 全域狀態 ---------- */
var STATE = { role:null, eventId:null, events:[], items:[], groups:[], weights:[] };

/* ---------- GAS 呼叫包裝（Promise） ---------- */
function gas(fn, args){
  return new Promise(function(res,rej){
    google.script.run.withSuccessHandler(res).withFailureHandler(function(e){toast('⚠ '+e.message);rej(e);})
      [fn].apply(google.script.run, args||[]);
  });
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.add('hidden');},2600);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function $(id){return document.getElementById(id);}

/* ---------- 登入 ---------- */
function chooseRole(role){
  STATE.role=role;
  if(role==='admin'){$('adminPw').classList.remove('hidden');$('pwInput').focus();}
  else doLogin(role);
}
function doLogin(role){
  var pw = role==='admin' ? $('pwInput').value : '';
  gas('login',[role,pw]).then(function(r){
    if(!r.ok){toast('❌ '+r.msg);return;}
    STATE.role=role;
    $('loginScreen').classList.add('hidden');
    $('app').classList.remove('hidden');
    $('roleChip').textContent = role==='admin'?'管理者':(role==='coach'?'教練/單位':'查詢');
    boot();
  });
}
function logout(){location.reload();}

/* ---------- 初始載入 ---------- */
function boot(){
  buildTabs();
  Promise.all([gas('getEvents'),gas('getGroups'),gas('getWeightClasses')]).then(function(a){
    STATE.events=a[0]; STATE.groups=a[1]; STATE.weights=a[2];
    var sel=$('eventSelect');
    sel.innerHTML = STATE.events.map(function(e){return '<option value="'+e.id+'">'+esc(e.name)+'</option>';}).join('');
    if(STATE.events.length){STATE.eventId=STATE.events[0].id;sel.value=STATE.eventId;}
    return gas('getItems',[STATE.eventId]);
  }).then(function(items){STATE.items=items||[];switchTab(TABS[0].id);});
}
function onEventChange(){
  STATE.eventId=$('eventSelect').value;
  gas('getItems',[STATE.eventId]).then(function(items){STATE.items=items||[];switchTab(currentTab);});
}

/* ---------- 分頁定義（依角色） ---------- */
var TABS=[];
function buildTabs(){
  if(STATE.role==='admin') TABS=[
    {id:'dash',name:'🏟️ 戰情室'},{id:'events',name:'🗓️ 賽事管理'},
    {id:'config',name:'⚙️ 項目/組別/量級'},{id:'regs',name:'📑 報名名單'},
    {id:'schedule',name:'🏆 自動分組/賽程'},{id:'live',name:'🥊 現場模式'},
    {id:'results',name:'🥇 成績/獎狀'},{id:'export',name:'📤 匯出'}
  ];
  else if(STATE.role==='coach') TABS=[{id:'apply',name:'📝 我要報名'},{id:'mylist',name:'📋 本單位名單'}];
  else TABS=[{id:'search',name:'🔍 查詢'}];
  $('tabs').innerHTML=TABS.map(function(t){return '<button data-id="'+t.id+'" onclick="switchTab(\''+t.id+'\')">'+t.name+'</button>';}).join('');
}
var currentTab=null;
function switchTab(id){
  currentTab=id;
  Array.prototype.forEach.call($('tabs').children,function(b){b.classList.toggle('active',b.dataset.id===id);});
  var v=$('view');v.innerHTML='<div class="loading">載入中…</div>';
  ({dash:renderDash,events:renderEvents,config:renderConfig,regs:renderRegs,schedule:renderSchedule,
    live:renderLive,results:renderResults,export:renderExport,apply:renderApply,mylist:renderMyList,search:renderSearch}[id])();
}

/* ===================== 管理者：戰情室 ===================== */
function renderDash(){
  gas('getDashboard',[STATE.eventId]).then(function(d){
    var ev=STATE.events.filter(function(e){return e.id===STATE.eventId;})[0]||{};
    $('view').innerHTML=
    '<div class="card"><h2><span class="bar"></span>🏟️ 武術賽事戰情室</h2>'+
      '<div class="sub">'+esc(ev.name||'尚未選擇賽事')+' ｜ '+esc(ev.date)+' ｜ '+esc(ev.location)+' ｜ 狀態：'+esc(ev.status)+'</div>'+
      '<div class="stats">'+
        statCard(d.totalAthletes,'報名總人數','gold')+
        statCard(d.totalUnits,'參賽單位數')+
        statCard(d.taolu,'套路項目人數')+
        statCard(d.sanda,'散打項目人數')+
        statCard(d.totalTeams,'團體隊伍數')+
        statCard(d.pending,'待審核人數',d.pending>0?'wait':'')+
        statCard(d.unpaid,'未繳費人數',d.unpaid>0?'wait':'')+
        statCard(d.scheduled,'已產生賽程項目','green')+
        statCard(d.unscheduled,'尚未產生賽程',d.unscheduled>0?'red':'')+
      '</div></div>'+
    '<div class="card"><h2><span class="bar"></span>快速操作</h2><div class="btnrow">'+
      '<button class="btn gold" onclick="switchTab(\'schedule\')">⚡ 一鍵產生賽程</button>'+
      '<button class="btn" onclick="switchTab(\'regs\')">📑 審核報名</button>'+
      '<button class="btn" onclick="switchTab(\'live\')">🥊 現場模式</button>'+
      '<button class="btn green" onclick="switchTab(\'export\')">📤 匯出</button>'+
      '<button class="btn ghost" onclick="doLoadDemo()">🎯 載入示範資料</button>'+
    '</div></div>'+
    '<div class="card"><h2><span class="bar"></span>單位報名排行</h2>'+
      '<div class="tablewrap"><table><thead><tr><th>名次</th><th>單位</th><th>報名數</th></tr></thead><tbody>'+
      (d.unitRank.length?d.unitRank.map(function(u,i){return '<tr><td>'+(i+1)+'</td><td>'+esc(u.unit)+'</td><td>'+u.count+'</td></tr>';}).join('')
        :'<tr><td colspan="3" style="text-align:center;color:var(--muted)">尚無報名，可按「🎯 載入示範資料」</td></tr>')+
      '</tbody></table></div></div>';
  });
}
function statCard(n,l,tone){
  var color=tone==='gold'?'var(--gold)':tone==='green'?'var(--green)':tone==='red'?'var(--red)':tone==='wait'?'#f0b429':'var(--gold)';
  return '<div class="stat"><div class="n" style="color:'+color+'">'+(n||0)+'</div><div class="l">'+l+'</div></div>';
}
function doLoadDemo(){
  if(!confirm('將建立/重置「（示範）全國武術邀請賽」並載入示範報名資料，確定？'))return;
  toast('載入中…');
  gas('loadDemoData').then(function(r){
    toast('✅ '+r.msg);
    boot(); // 重新載入賽事清單
    setTimeout(function(){
      var sel=$('eventSelect'); if(sel){sel.value=r.eventId;STATE.eventId=r.eventId;}
      gas('getItems',[r.eventId]).then(function(items){STATE.items=items||[];switchTab('dash');});
    },800);
  });
}

/* ===================== 管理者：賽事管理 ===================== */
function renderEvents(){
  gas('getEvents').then(function(list){
    STATE.events=list;
    $('view').innerHTML=
    '<div class="card"><h2><span class="bar"></span>新增 / 編輯賽事</h2>'+
    '<div class="grid g2">'+
      field('比賽名稱','ev_name')+field('日期','ev_date','date')+
      field('地點','ev_location')+field('主辦單位','ev_host')+
      field('報名開始日','ev_regStart','date')+field('報名截止日','ev_regEnd','date')+
      '<div><label class="f">狀態</label><select id="ev_status" class="inp">'+
        ['報名中','報名截止','賽事進行中','已結束'].map(function(s){return '<option>'+s+'</option>';}).join('')+'</select></div>'+
    '</div>'+
    '<input type="hidden" id="ev_id">'+
    '<div class="btnrow"><button class="btn gold" onclick="saveEvent()">💾 儲存賽事</button>'+
    '<button class="btn ghost" onclick="renderEvents()">清空</button></div></div>'+
    '<div class="card"><h2><span class="bar"></span>賽事列表</h2><div class="tablewrap"><table>'+
    '<thead><tr><th>名稱</th><th>日期</th><th>地點</th><th>狀態</th><th>操作</th></tr></thead><tbody>'+
    list.map(function(e){return '<tr><td>'+esc(e.name)+'</td><td>'+esc(e.date)+'</td><td>'+esc(e.location)+
      '</td><td><span class="pill '+(e.status==='報名中'?'ok':'wait')+'">'+esc(e.status)+'</span></td>'+
      '<td><button class="btn sm ghost" onclick=\'editEvent('+JSON.stringify(e)+')\'>編輯</button> '+
      '<button class="btn sm red" onclick="delEvent(\''+e.id+'\')">刪除</button></td></tr>';}).join('')+
    '</tbody></table></div></div>';
  });

function editEvent(e){['name','date','location','host','regStart','regEnd','status'].forEach(function(k){$('ev_'+k).value=e[k]||'';});$('ev_id').value=e.id;window.scrollTo(0,0);}
function saveEvent(){

    host:$('ev_host').value,regStart:$('ev_regStart').value,regEnd:$('ev_regEnd').value,status:$('ev_status').value};
  if(!e.name){toast('請填比賽名稱');return;}
  gas(e.id?'updateEvent':'createEvent',[e]).then(function(){toast('✅ 已儲存');boot();renderEvents();});
}
function delEvent(id){if(!confirm('確定刪除此賽事？'))return;gas('deleteEvent',[id]).then(function(){toast('已刪除');renderEvents();boot();});}

/* ===================== 管理者：項目/組別/量級 ===================== */
function renderConfig(){
  Promise.all([gas('getItems',[STATE.eventId]),gas('getGroups'),gas('getWeightClasses')]).then(function(a){
    STATE.items=a[0];STATE.groups=a[1];STATE.weights=a[2];

    '</div>'+
    /* LINE 設定 */

        '<div><label class="f">推播對象 ID（userId / groupId）</label><input id="ln_to" class="inp" placeholder="Uxxxx 或 Cxxxx"></div>'+
      '</div><div class="btnrow"><button class="btn gold" onclick="saveLine()">💾 儲存 LINE 設定</button></div>'+
    '</div>';
    gas('getSetting',['lineToken']).then(function(v){if($('ln_token'))$('ln_token').value=v||'';});
    gas('getSetting',['lineTo']).then(function(v){if($('ln_to'))$('ln_to').value=v||'';});
  });
}
function saveLine(){

/* ===================== 管理者：報名名單 ===================== */
function renderRegs(){
  $('view').innerHTML=
  '<div class="card"><h2><span class="bar"></span>報名名單與審核</h2>'+

function loadRegs(){

    groupName:$('f_group')?$('f_group').value:'',gender:$('f_gender')?$('f_gender').value:'',

      var units={};list.forEach(function(r){units[r.unit]=1;});

    }
    if(kw)list=list.filter(function(r){return (r.athleteName&&r.athleteName.indexOf(kw)>-1)||(r.unit&&r.unit.indexOf(kw)>-1);});

      (list.length?list.map(function(r){return '<tr><td>'+esc(r.athleteName)+'</td><td>'+esc(r.unit)+'</td><td>'+esc(r.itemName)+
        '</td><td>'+esc(r.itemType)+'</td><td>'+esc(r.groupName)+'</td><td>'+esc(r.gender)+'</td><td>'+esc(r.weightClass||'-')+'</td>'+
        '<td>'+reviewPill(r.review)+'</td><td>'+feePill(r.fee)+'</td>'+
        '<td><button class="btn sm green" onclick="setReview(\''+r.id+'\',\'已審核\')">核准</button> '+
        '<button class="btn sm ghost" onclick="setFee(\''+r.id+'\')">收費</button> '+
        '<button class="btn sm red" onclick="delReg(\''+r.id+'\')">刪</button></td></tr>';}).join('')
        :'<tr><td colspan="10" style="text-align:center;color:var(--muted)">無資料</td></tr>')+
      '</tbody></table></div>';

  gas('getTeams',[STATE.eventId]).then(function(teams){
    $('teamTable').innerHTML='<div class="tablewrap"><table><thead><tr><th>隊名</th><th>單位</th><th>項目</th><th>組別</th><th>隊員</th><th>審核</th><th>操作</th></tr></thead><tbody>'+
      (teams.length?teams.map(function(t){return '<tr><td>'+esc(t.teamName)+'</td><td>'+esc(t.unit)+'</td><td>'+esc(t.itemName)+
        '</td><td>'+esc(t.groupName)+'</td><td>'+esc((t.membersArr||[]).join('、'))+'</td><td>'+reviewPill(t.review)+'</td>'+
        '<td><button class="btn sm green" onclick="setTeamReview(\''+t.id+'\')">核准</button> '+
        '<button class="btn sm red" onclick="delTeam(\''+t.id+'\')">刪</button></td></tr>';}).join('')
        :'<tr><td colspan="7" style="text-align:center;color:var(--muted)">無團體報名</td></tr>')+'</tbody></table></div>';
  });
}
function reviewPill(s){return '<span class="pill '+(s==='已審核'?'ok':(s==='退件'?'no':'wait'))+'">'+esc(s)+'</span>';}
function feePill(s){return '<span class="pill '+(s==='已繳費'?'ok':'no')+'">'+esc(s)+'</span>';}
function setReview(id,v){gas('reviewRegistration',[id,v,undefined]).then(function(){toast('已核准');loadRegs();});}
function setFee(id){gas('reviewRegistration',[id,undefined,'已繳費']).then(function(){toast('已收費');loadRegs();});}
function delReg(id){if(!confirm('確定刪除此報名？'))return;gas('deleteRegistration',[id]).then(function(){loadRegs();});}
function setTeamReview(id){gas('reviewTeam',[id,'已審核',undefined]).then(function(){toast('已核准');loadRegs();});}
function delTeam(id){if(!confirm('確定刪除此隊伍？'))return;gas('deleteTeam',[id]).then(function(){loadRegs();});}

/* ===================== 管理者：自動分組 / 賽程 ===================== */
function renderSchedule(){

  '<div class="card"><h2><span class="bar"></span>一鍵分組與賽程</h2>'+
    '<div class="sub">依「項目＋組別＋性別＋量級」自動分組。套路→出場序；散打→單敗淘汰(補BYE)；團體→隊伍出場序。</div>'+
    '<div class="btnrow">'+
      '<button class="btn ghost" onclick="doAutoGroup()">🧩 一鍵自動分組</button>'+
      '<button class="btn gold" onclick="doGenSchedule()">⚡ 一鍵產生賽程</button>'+
      '<button class="btn green" onclick="copyScheduleLine()">💬 複製賽程 LINE 文字</button>'+
      '<button class="btn" onclick="pushSchedule()">📲 推播到 LINE</button>'+
      '<button class="btn ghost" onclick="printProgramBook()">🖨️ 列印/存 PDF 秩序冊</button>'+
    '</div><div id="groupResult" style="margin-top:14px"></div></div>'+
  '<div id="scheduleList"></div>';
  loadSchedules();
}
function doAutoGroup(){
  gas('autoGroup',[STATE.eventId]).then(function(r){
    $('groupResult').innerHTML='<div class="tablewrap"><table><thead><tr><th>分組(項目/組別/性別/量級)</th><th>類型</th><th>人數</th></tr></thead><tbody>'+
      r.groups.map(function(g){return '<tr><td>'+esc(g.key)+'</td><td>'+esc(g.itemType)+'</td><td>'+g.count+'</td></tr>';}).join('')+
      '</tbody></table></div><div class="sub" style="margin-top:8px">共 '+r.groups.length+' 組、'+r.total+' 位已審核選手。</div>';
  });
}
function doGenSchedule(){
  if(!confirm('將重新產生本賽事所有賽程，確定？'))return;
  $('scheduleList').innerHTML='<div class="loading">產生中…</div>';
  gas('generateSchedule',[STATE.eventId]).then(function(r){toast('✅ '+r.msg);loadSchedules();});
}
function loadSchedules(){
  gas('getSchedules',[STATE.eventId]).then(function(list){
    if(!list.length){$('scheduleList').innerHTML='<div class="card"><div class="sub">尚未產生賽程。</div></div>';return;}
    $('scheduleList').innerHTML=list.map(function(s){return renderOneSchedule(s);}).join('');
  });
}
function renderOneSchedule(s){
  var d=s.dataObj,html='';
  if(d.kind==='order'){
    html='<div class="tablewrap"><table><thead><tr><th>出場序</th><th>姓名</th><th>單位</th></tr></thead><tbody>'+
      d.order.map(function(o){return '<tr><td><b style="color:var(--gold)">'+o.seq+'</b></td><td>'+esc(o.name)+'</td><td>'+esc(o.unit)+'</td></tr>';}).join('')+'</tbody></table></div>';
  }else if(d.kind==='teamOrder'){
    html='<div class="tablewrap"><table><thead><tr><th>出場序</th><th>隊名</th><th>單位</th><th>隊員</th></tr></thead><tbody>'+
      d.order.map(function(o){return '<tr><td><b style="color:var(--gold)">'+o.seq+'</b></td><td>'+esc(o.teamName)+'</td><td>'+esc(o.unit)+'</td><td>'+esc((o.members||[]).join('、'))+'</td></tr>';}).join('')+'</tbody></table></div>';
  }else if(d.kind==='bracket'){
    html=renderBracket(s.id,d.bracket);
  }
  return '<div class="card"><h2><span class="bar"></span>'+esc(s.groupKey)+' <span class="pill wait">'+esc(s.itemType)+'</span></h2>'+html+'</div>';
}
function renderBracket(schId,b){
  var roundNames=function(i,total){if(i===total-1)return '決賽';if(i===total-2)return '準決賽';return '第'+(i+1)+'輪';};
  var cols=b.rounds.map(function(round,ri){
    return '<div class="round"><h4>'+roundNames(ri,b.rounds.length)+'</h4>'+
      round.map(function(m,mi){return matchHtml(schId,ri,mi,m);}).join('')+'</div>';
  }).join('');
  return '<div class="sub">共 '+b.count+' 人，補 '+b.byes+' 個 BYE（自動晉級）。可點「勝」決定晉級。</div>'+
    '<div class="bracket">'+cols+'</div>';
}
function matchHtml(schId,ri,mi,m){
  function side(p,which){
    if(!p) return '<div class="side bye"><span class="nm">待定</span></div>';
    if(p.bye) return '<div class="side bye"><span class="nm">BYE</span></div>';
    var isWin=m.winner && m.winner.name===p.name;
    var btn = (ri===0||true) && m.a && m.b && !m.a.bye && !m.b.bye ?
      '<button onclick="winMatch(\''+schId+'\','+ri+','+mi+',\''+which+'\')">勝</button>':'';
    return '<div class="side'+(isWin?' win':'')+'"><span class="nm">'+esc(p.name)+' <span class="u">'+esc(p.unit||'')+'</span></span>'+btn+'</div>';
  }
  return '<div class="match">'+side(m.a,'a')+side(m.b,'b')+'</div>';
}
function winMatch(schId,ri,mi,side){
  gas('setMatchWinner',[schId,ri,mi,side]).then(function(r){if(!r.ok){toast(r.msg);return;}toast('✅ 已晉級');loadSchedules();});
}

/* ===================== 管理者：現場模式 ===================== */
function renderLive(){
  gas('getLiveData',[STATE.eventId]).then(function(list){
    if(!list.length){
      $('view').innerHTML='<div class="card"><h2><span class="bar"></span>🥊 現場模式</h2>'+
        '<div class="sub">目前沒有散打對戰表。請先到「自動分組/賽程」產生散打賽程。</div></div>';
      return;
    }
    $('view').innerHTML='<div class="card"><h2><span class="bar"></span>🥊 現場比賽模式（散打）</h2>'+
      '<div class="sub">選擇量級分組 → 顯示目前場次與下一場 → 按勝方／棄權／輸入比分 → 完成自動晉級。</div>'+
      '<div class="btnrow" id="liveGroups">'+
      list.map(function(g,i){return '<button class="btn '+(i===0?'gold':'ghost')+'" data-i="'+i+'" onclick="pickLive('+i+')">'+
        esc(g.groupKey.split(' / ').slice(2).join(' '))+'（剩 '+g.remaining+' 場）</button>';}).join('')+
      '</div></div><div id="liveArena"></div>';
    window._liveData=list; pickLive(0);
  });
}
function pickLive(i){
  var g=window._liveData[i];
  Array.prototype.forEach.call($('liveGroups').children,function(b){
    b.classList.toggle('gold',b.dataset.i==i);b.classList.toggle('ghost',b.dataset.i!=i);});
  var html='<div class="card"><h2><span class="bar"></span>'+esc(g.groupKey)+'</h2>';
  if(g.finished){
    html+='<div class="arena done"><div class="champ">🏆 冠軍：'+esc(g.champion?g.champion.name:'—')+'</div>'+
      '<div class="sub" style="text-align:center">所有場次已完成</div>'+
      '<div class="btnrow" style="justify-content:center"><button class="btn gold" onclick="makePodium(\''+g.scheduleId+'\')">🥇 產生冠亞季軍</button></div></div>';
  }else if(g.current){
    var c=g.current;
    html+='<div class="arena">'+
      '<div class="arena-top"><span class="pill wait">目前場次</span> 第 '+(c.ri+1)+' 輪</div>'+
      '<div class="vs">'+
        '<div class="fighter red"><div class="cor">紅方</div><div class="fn">'+esc(c.a.name)+'</div><div class="fu">'+esc(c.a.unit||'')+'</div>'+
          '<input id="scoreA" class="inp scoreInp" type="number" placeholder="紅方分數"></div>'+
        '<div class="vsx">VS</div>'+
        '<div class="fighter blue"><div class="cor">藍方</div><div class="fn">'+esc(c.b.name)+'</div><div class="fu">'+esc(c.b.unit||'')+'</div>'+
          '<input id="scoreB" class="inp scoreInp" type="number" placeholder="藍方分數"></div>'+
      '</div>'+
      '<div class="arena-btns">'+
        '<button class="btn red" style="flex:1" onclick="finishMatch(\''+g.scheduleId+'\','+c.ri+','+c.mi+',\'a\')">🥊 紅方勝</button>'+
        '<button class="btn" style="flex:1;background:#2563eb" onclick="finishMatch(\''+g.scheduleId+'\','+c.ri+','+c.mi+',\'b\')">🥊 藍方勝</button>'+
      '</div>'+
      '<div class="arena-btns" style="margin-top:8px">'+
        '<button class="btn ghost sm" onclick="walkover(\''+g.scheduleId+'\','+c.ri+','+c.mi+',\'a\')">紅方棄權</button>'+
        '<button class="btn ghost sm" onclick="walkover(\''+g.scheduleId+'\','+c.ri+','+c.mi+',\'b\')">藍方棄權</button>'+
      '</div>'+
      '<div class="sub" style="margin-top:10px;text-align:center">已完成 '+g.doneCount+' 場 ｜ 尚餘 '+g.remaining+' 場</div>'+
    '</div>';
    if(g.next){
      html+='<div class="nextbar">下一場 ▶ <b>'+esc(g.next.a.name)+'</b> <span class="u">'+esc(g.next.a.unit||'')+'</span>'+
        ' vs <b>'+esc(g.next.b.name)+'</b> <span class="u">'+esc(g.next.b.unit||'')+'</span></div>';
    }
  }else{
    html+='<div class="sub">目前無可進行場次（可能等待上一輪結果）。</div>';
  }
  html+='</div>';
  $('liveArena').innerHTML=html;
}
function finishMatch(sid,ri,mi,side){
  var sA=$('scoreA')?$('scoreA').value:'', sB=$('scoreB')?$('scoreB').value:'';
  gas('completeLiveMatch',[sid,ri,mi,{winnerSide:side,scoreA:sA,scoreB:sB}]).then(function(r){
    toast(r.ok?r.msg:('⚠ '+r.msg)); if(r.ok)renderLive();});
}
function walkover(sid,ri,mi,giveupSide){
  if(!confirm((giveupSide==='a'?'紅方':'藍方')+'棄權，由對方獲勝晉級？'))return;
  gas('completeLiveMatch',[sid,ri,mi,{walkover:giveupSide}]).then(function(r){
    toast(r.ok?'✅ 已記棄權':'⚠ '+r.msg); if(r.ok)renderLive();});
}
function makePodium(sid){
  gas('generateSandaPodium',[sid]).then(function(r){
    if(!r.ok){toast('⚠ '+r.msg);return;}
    toast('🥇 '+r.podium.map(function(p){return '第'+p.rank+' '+p.name;}).join('、'));
  });
}

function addResult(){

// 自動排名：載入該套路/團體分組的選手，逐一輸入分數
function loadScoreInputs(){
  var sid=$('ar_group').value;if(!sid){$('scoreInputs').innerHTML='';return;}
  var s=SCHE_CACHE.filter(function(x){return x.id===sid;})[0];if(!s){return;}
  var d=s.dataObj,people=[];
  if(d.kind==='order')people=d.order.map(function(o){return {name:o.name,unit:o.unit};});
  else if(d.kind==='teamOrder')people=d.order.map(function(o){return {name:o.teamName,unit:o.unit};});
  $('scoreInputs').innerHTML='<div class="sub">分組：'+esc(s.groupKey)+'　輸入每位分數後按「自動排名」</div>'+
    '<div class="tablewrap"><table><thead><tr><th>姓名/隊名</th><th>單位</th><th>分數</th></tr></thead><tbody>'+
    people.map(function(p,i){return '<tr><td>'+esc(p.name)+'</td><td>'+esc(p.unit||'')+'</td>'+
      '<td><input class="inp scoreRow" data-name="'+esc(p.name)+'" data-unit="'+esc(p.unit||'')+'" type="number" style="width:110px;padding:6px"></td></tr>';}).join('')+

function doRankByScore(groupKey){
  var scores=[];Array.prototype.forEach.call(document.querySelectorAll('.scoreRow'),function(inp){
    if(inp.value!=='')scores.push({name:inp.dataset.name,unit:inp.dataset.unit,score:Number(inp.value)});});
  if(!scores.length){toast('請至少輸入一個分數');return;}
  gas('rankByScore',[STATE.eventId,groupKey,scores]).then(function(r){toast('✅ '+r.msg);renderResults();});
}

}

function onItemPick(){
  var sel=$('a_item');if(!sel)return;
  var type=sel.options[sel.selectedIndex].dataset.type;
  var need=type==='散打';
  $('a_weightBox').classList.toggle('hidden',!need);
  $('a_wcBox').classList.toggle('hidden',!need);
  if(need)autoWeightClass();
}
function autoWeightClass(){
  var g=$('a_gender').value,w=Number($('a_weight').value||0);
  var opts=STATE.weights.filter(function(x){return x.gender===g;});
  var match=opts.filter(function(x){return w>x.minW && w<=x.maxW;});
  $('a_wc').innerHTML=opts.map(function(x){return '<option'+(match[0]&&match[0].id===x.id?' selected':'')+'>'+esc(x.name)+'</option>';}).join('');
  // 體重不符任何量級 → 提醒
  var warn=$('a_wcWarn');
  if(w>0 && !match.length){
    if(!warn){warn=document.createElement('div');warn.id='a_wcWarn';warn.style.cssText='grid-column:1/-1;color:var(--red);font-size:13px;background:rgba(224,65,74,.1);border:1px solid rgba(224,65,74,.4);border-radius:8px;padding:8px 12px';$('a_wcBox').parentNode.appendChild(warn);}
    warn.textContent='⚠ 體重 '+w+'kg 不符合任何「'+g+'」量級，請確認體重或請管理者新增量級';
    warn.classList.remove('hidden');
  }else if(warn){warn.classList.add('hidden');}
}

function printProgramBook(){
  gas('generateProgramBook',[STATE.eventId]).then(function(b){
    var ev=b.event||{};
    var sections=b.sections.map(function(sec){
      var d=sec.data,inner='';
      if(d.kind==='order'){
        inner='<table><thead><tr><th>出場序</th><th>姓名</th><th>單位</th></tr></thead><tbody>'+
          d.order.map(function(o){return '<tr><td>'+o.seq+'</td><td>'+esc(o.name)+'</td><td>'+esc(o.unit)+'</td></tr>';}).join('')+'</tbody></table>';
      }else if(d.kind==='teamOrder'){
        inner='<table><thead><tr><th>出場序</th><th>隊名</th><th>單位</th><th>隊員</th></tr></thead><tbody>'+
          d.order.map(function(o){return '<tr><td>'+o.seq+'</td><td>'+esc(o.teamName)+'</td><td>'+esc(o.unit)+'</td><td>'+esc((o.members||[]).join('、'))+'</td></tr>';}).join('')+'</tbody></table>';
      }else if(d.kind==='bracket'){
        inner='<p>單敗淘汰 '+d.bracket.count+' 人（補 '+d.bracket.byes+' 個 BYE）</p><table><thead><tr><th>場次</th><th>紅方</th><th>黑方</th></tr></thead><tbody>'+
          d.bracket.rounds[0].map(function(m,i){return '<tr><td>第'+(i+1)+'場</td><td>'+esc(m.a?m.a.name:'待定')+'</td><td>'+esc(m.b?m.b.name:'待定')+'</td></tr>';}).join('')+'</tbody></table>';
      }
      return '<section><h2>'+esc(sec.groupKey)+'　<small>['+esc(sec.itemType)+']</small></h2>'+inner+'</section>';
